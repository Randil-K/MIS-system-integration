server {
    listen 8080;
    server_name localhost;

    # Hide backend CORS headers to prevent duplicates
    proxy_hide_header 'Access-Control-Allow-Origin';
    proxy_hide_header 'Access-Control-Allow-Methods';
    proxy_hide_header 'Access-Control-Allow-Headers';
    proxy_hide_header 'Access-Control-Allow-Credentials';

    # Global CORS configuration
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Allow-Credentials' 'false' always;



    # Logistics Module endpoints
    location ~ ^/api/(shipments|logistics|dashboard) {
        proxy_pass http://logistics-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Order and Billing Module endpoints
    location ~ ^/api/(orders|invoices|customers) {
        proxy_pass http://order-backend:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Shared products endpoint (route based on referer)
    location ~ ^/api/products {
        if ($http_referer ~* "/inventory") {
            proxy_pass http://inventory-backend:8081;
            break;
        }
        proxy_pass http://order-backend:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inventory Module endpoints
    location ~ ^/api/inventory {
        proxy_pass http://inventory-backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # User Management Module endpoints
    location ~ ^/api/(users|auth|admin|public) {
        proxy_pass http://user-backend:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
