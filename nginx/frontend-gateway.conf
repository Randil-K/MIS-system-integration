server {
    listen 3000;
    server_name localhost;

    # Force browser to send full referer URL so API gateway can route correctly
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # User Management Frontend (Root)
    location / {
        proxy_pass http://user-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Logistics Frontend
    location /logistics/ {
        proxy_pass http://logistics-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Order and Billing Frontend
    location /orders/ {
        proxy_pass http://order-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inventory Frontend
    location /inventory/ {
        proxy_pass http://inventory-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
